<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Feed AI Studio</title>
    <link rel="stylesheet" href="/static/form.css">
  </head>
  <body>
    <div class="app-shell">
      <div style="display:flex; justify-content:flex-end; margin-bottom: 12px;">
        <a href="/" style="color:#d8b4fe; text-decoration:none; font-weight:600;">← Back to Feed</a>
      </div>
      <section class="hero">
        <h1>Personal Feed AI Studio</h1>
        <p>Choose a ready-made prompt, generate polished content with the backend API, and review the result in a sleek studio-style dashboard.</p>
      </section>
      <section class="panel">
        <div class="controls">
          <div>
            <label for="promptSelect" style="display:block; margin-bottom:8px; color:var(--muted);">Prompt</label>
            <select id="promptSelect"></select>
          </div>
          <div>
            <label for="generateBtn" style="display:block; margin-bottom:8px; color:var(--muted);">Action</label>
            <button id="generateBtn" class="primary-btn">Generate Post</button>
          </div>
        </div>
        <textarea id="extraContext" rows="4" placeholder="Optional extra context for the generation pass..." style="margin-top: 16px;"></textarea>
        <div id="status" class="status">Loading prompts…</div>
        <div id="resultCard" class="result-card" style="display:none;">
          <h3>Generated Content</h3>
          <pre id="resultOutput"></pre>
        </div>
      </section>
    </div>
    <script src="/static/form.js"></script>
  </body>
</html>
